<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>城市單字闖關</title><style>:root{--b:#2563eb;--g:#15803d;--r:#b91c1c;--l:#e5e7eb}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;background:linear-gradient(#eef4ff,#f5f7fb);color:#1f2937}.w{max-width:850px;margin:auto;padding:22px 16px 48px}h1{font-size:clamp(30px,6vw,48px);margin:0 0 6px}.sub{color:#6b7280}.card,.bank{background:#fff;border:1px solid var(--l);border-radius:22px;padding:22px;margin-top:22px;box-shadow:0 12px 28px #2563eb14}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.s{text-align:center;background:#f8fafc;border:1px solid var(--l);border-radius:15px;padding:13px}.s b{display:block;font-size:24px}.s span,label{color:#6b7280;font-size:14px}.controls{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0}label{display:block;margin-bottom:6px}select,input,button{width:100%;padding:13px;border:1px solid var(--l);border-radius:13px;font-size:17px;background:#fff}button{font-weight:800;cursor:pointer}.p{background:var(--b);color:#fff;border-color:var(--b)}.q{text-align:center;font-weight:900;font-size:clamp(27px,5vw,40px);margin:30px 0 8px}.hint,.fb{text-align:center;min-height:25px}.hint{color:#6b7280}.answers{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}.ans{min-height:60px}.ok{background:#dcfce7!important;color:#166534;border-color:#86efac!important}.no{background:#fee2e2!important;color:#991b1b;border-color:#fca5a5!important}.type{display:flex;gap:10px;margin-top:18px}.type button{width:130px}.fb{font-weight:800;margin-top:14px}.good{color:var(--g)}.bad{color:var(--r)}.bar{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin-top:16px}.bar div{height:100%;background:var(--b);width:0;transition:.2s}.actions{display:flex;gap:10px;margin-top:16px}.hide{display:none!important}.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.chip{background:#f1f5f9;padding:7px 10px;border-radius:99px;font-size:14px}@media(max-width:620px){.controls,.answers{grid-template-columns:1fr}.type,.actions{flex-direction:column}.type button{width:100%}}</style></head><body><div class="w"><h1>🏙️ 城市單字闖關</h1><div class="sub">英文乙版第三冊 Unit 1｜答錯的單字會提高再次出現機率</div><div class="card"><div class="stats"><div class="s"><b id="score">0</b><span>分數</span></div><div class="s"><b id="streak">0</b><span>連續答對</span></div><div class="s"><b id="num">0/10</b><span>進度</span></div></div><div class="controls"><div><label>遊戲模式</label><select id="mode"><option value="choice">四選一</option><option value="typing">拼字挑戰</option><option value="mixed">混合模式</option></select></div><div><label>出題方向</label><select id="dir"><option value="zh-en">中文 → 英文</option><option value="en-zh">英文 → 中文</option><option value="random">隨機</option></select></div></div><button id="start" class="p">開始遊戲</button><section id="game" class="hide"><div id="q" class="q"></div><div id="hint" class="hint"></div><div id="choices" class="answers"></div><div id="typing" class="type hide"><input id="input" autocomplete="off"><button id="submit" class="p">送出</button></div><div id="fb" class="fb"></div><div class="bar"><div id="bar"></div></div><div class="actions"><button id="next" class="hide">下一題</button><button id="restart">重新開始</button></div></section></div><div class="bank"><details><summary><b>查看本課單字表</b></summary><div id="chips" class="chips"></div></details></div></div><script>const W=[['evolve','逐步發展；演變','evolve into sth'],['prioritize','按優先順序處理','prioritize sth'],['consult','查閱；諮詢','consult sb about/on sth'],['accommodate','容納；提供膳宿','accommodate sb/sth'],['distribute','分配；散布','distribute sth to/among'],['integrate','使融合；整合','integrate sth with/into sth'],['warn','警告；告誡','warn sb about/against sth'],['adjust','調整','adjust sth to sth'],['enhance','提高；增強','enhance quality/performance'],['establish','建立；創辦','establish a business/system'],['overestimate','高估','overestimate the impact of sth'],['flourish','茁壯；繁榮','flourish'],['streamline','使流線化；簡化','streamline routes/processes'],['aid','幫助；支援','aid sb in doing sth'],['resident','居民；居住者','residents of big cities'],['facility','設施；場所','leisure/hotel/military facilities'],['vision','願景；視力','have a clear vision of sth'],['concept','概念；觀念','the concept of sth'],['access','途徑；機會','have/gain access to sth'],['admission','准許進入；入學許可','apply for admission'],['insight','洞察力；了解','gain/provide insight into sth'],['emergency','緊急狀況','in an emergency'],['summary','概要；摘要','write/give a summary'],['route','路線','take/follow a route'],['component','組成部分','a key component'],['estimate','估算','make an estimate']].map(x=>({en:x[0],zh:x[1],c:x[2]}));const $=x=>document.getElementById(x),mix=a=>[...a].sort(()=>Math.random()-.5),pick=a=>a[Math.floor(Math.random()*a.length)];let score=0,streak=0,n=0,cur,done=false,weak={},mode,dir;function weighted(){let p=[];W.forEach(w=>{for(let i=0;i<1+(weak[w.en]||0);i++)p.push(w)});return pick(p)}function start(){score=streak=n=0;weak={};$('score').textContent=0;$('streak').textContent=0;$('start').classList.add('hide');$('game').classList.remove('hide');question()}function question(){if(n>=10)return finish();done=false;n++;cur=weighted();mode=$('mode').value==='mixed'?(Math.random()<.5?'choice':'typing'):$('mode').value;dir=$('dir').value==='random'?(Math.random()<.5?'zh-en':'en-zh'):$('dir').value;$('num').textContent=n+'/10';$('bar').style.width=(n-1)*10+'%';$('fb').textContent='';$('fb').className='fb';$('next').classList.add('hide');$('choices').innerHTML='';$('input').value='';$('q').textContent=dir==='zh-en'?cur.zh:cur.en;$('hint').textContent='搭配詞：'+cur.c;$('input').placeholder=dir==='zh-en'?'輸入英文單字':'輸入中文意思';if(mode==='choice'){$('choices').classList.remove('hide');$('typing').classList.add('hide');mix([cur,...mix(W.filter(w=>w.en!==cur.en)).slice(0,3)]).forEach(w=>{let b=document.createElement('button');b.className='ans';b.textContent=dir==='zh-en'?w.en:w.zh;b.onclick=()=>checkChoice(w,b);$('choices').appendChild(b)})}else{$('choices').classList.add('hide');$('typing').classList.remove('hide');setTimeout(()=>$('input').focus(),50)}}function checkChoice(w,b){if(done)return;done=true;let ok=w.en===cur.en,[...$('choices').children].forEach(x=>{if(x.textContent===(dir==='zh-en'?cur.en:cur.zh))x.classList.add('ok')});if(ok){b.classList.add('ok');correct()}else{b.classList.add('no');wrong()}$('next').classList.remove('hide')}function norm(s){return s.trim().toLowerCase().replace(/[；;，,。.!！?？]/g,'')}function checkType(){if(done)return;let v=norm($('input').value);if(!v)return;done=true;let ok=dir==='zh-en'?v===norm(cur.en):cur.zh.split(/[；;]/).map(norm).some(x=>v.includes(x)||x.includes(v));ok?correct():wrong();$('next').classList.remove('hide')}function correct(){let add=10+Math.min(streak,5)*2;score+=add;streak++;weak[cur.en]=Math.max(0,(weak[cur.en]||0)-1);$('fb').textContent='答對了！+'+add+' 分';$('fb').classList.add('good');update()}function wrong(){streak=0;weak[cur.en]=(weak[cur.en]||0)+2;$('fb').textContent='正確答案：'+(dir==='zh-en'?cur.en:cur.zh);$('fb').classList.add('bad');update()}function update(){$('score').textContent=score;$('streak').textContent=streak}function finish(){$('bar').style.width='100%';$('choices').classList.add('hide');$('typing').classList.add('hide');$('next').classList.add('hide');let m=Object.entries(weak).filter(x=>x[1]>0).sort((a,b)=>b[1]-a[1]).slice(0,5).map(x=>x[0]);$('q').textContent=score>=110?'🎉 太厲害了！':score>=80?'👏 闖關成功！':'💪 再挑戰一次！';$('hint').textContent='總分：'+score+' 分';$('fb').textContent=m.length?'建議再複習：'+m.join('、'):'全部掌握得很好！';$('fb').className='fb '+(score>=80?'good':'bad')}$('start').onclick=start;$('restart').onclick=start;$('next').onclick=question;$('submit').onclick=checkType;$('input').addEventListener('keydown',e=>{if(e.key==='Enter')done?question():checkType()});W.forEach(w=>{let s=document.createElement('span');s.className='chip';s.textContent=w.en+'｜'+w.zh;$('chips').appendChild(s)});</script></body></html>
